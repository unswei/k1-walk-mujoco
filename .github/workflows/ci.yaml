name: ci

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,cleanrl]'

      - name: Fetch assets
        run: python scripts/fetch_assets.py

      - name: Run tests
        run: pytest -q

      - name: PPO Smoke
        run: |
          python scripts/train_cleanrl_ppo.py \
            --config configs/train_ppo_cleanrl.yaml \
            --run-name ci_smoke_${{ runner.os }} \
            --seed 7 \
            --device cpu \
            --num-envs 1 \
            --total-timesteps 512

      - name: Rollout Smoke
        run: |
          python scripts/rollout.py --episodes 1 --seed 7 --max-steps 50
