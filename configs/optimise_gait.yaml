  population_per_round: 64
  keep_top_k: 16

objective:
  w_v: 3.0
  w_fall: 6.0
  w_lat: 1.0
  w_yaw: 0.8
  w_tau: 0.25
  w_limits: 0.5

io:
  out_dir: runs/gait_optim
  run_prefix: param_gait_15
  gait_seed_config: configs/gait_param_15.yaml
  record_best_video: false
