seed: 1
milestone: m2
env_config_path: configs/env_k1_walk.yaml
eval_suite_path: configs/eval_suites_goal_pose.yaml
eval_nominal_suite: easy
eval_stress_suite: stress
eval_extra_suites: [medium, hard]

device: auto
total_timesteps: 12000000
num_envs: auto
num_steps: 512
learning_rate: 0.0003
gamma: 0.99
gae_lambda: 0.95
clip_coef: 0.2
vf_coef: 0.5
ent_coef: 0.0
max_grad_norm: 0.5
target_kl: null
update_epochs: 10
num_minibatches: 32
anneal_lr: true

run_dir: runs/cleanrl_ppo
tensorboard: true
wandb: false
wandb_project: k1-walk-mujoco
eval_every_updates: 10
eval_episodes: 1
save_every_updates: 50
print_every_updates: 5
nan_watchdog: true

env_overrides:
  task:
    mode: command_tracking
  randomization:
    enabled: true
    friction_range: [0.95, 1.05]
    mass_scale_range: [0.95, 1.05]
    motor_strength_scale_range: [0.95, 1.05]
    obs_noise_std: 0.002
    action_latency_steps: [0, 1]
    push:
      enabled: false
