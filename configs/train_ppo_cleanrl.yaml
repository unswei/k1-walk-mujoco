# CleanRL PPO defaults for K1 MuJoCo.
# Override from CLI as needed, e.g.:
#   python scripts/train_cleanrl_ppo.py --config configs/train_ppo_cleanrl.yaml --seed 2 --num-envs 16

seed: 1
env_config_path: configs/env_k1_walk.yaml

# auto -> cuda (if available) -> mps (if available) -> cpu
device: auto
total_timesteps: 1000000
num_envs: auto
num_steps: 512

learning_rate: 0.0003
gamma: 0.99
gae_lambda: 0.95
clip_coef: 0.2
vf_coef: 0.5
ent_coef: 0.0
max_grad_norm: 0.5
target_kl: null

update_epochs: 10
num_minibatches: 32
anneal_lr: true

run_dir: runs/cleanrl_ppo
tensorboard: true
wandb: false
wandb_project: k1-walk-mujoco

eval_every_updates: 10
eval_episodes: 1
save_every_updates: 50
video: false
