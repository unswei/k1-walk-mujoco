seed: 1
milestone: m5
env_config_path: configs/env_k1_walk.yaml
eval_suite_path: configs/eval_suites_goal_pose.yaml
eval_nominal_suite: easy
eval_stress_suite: stress
eval_extra_suites: [medium, hard]

device: auto
total_timesteps: 16000000
num_envs: auto
num_steps: 512
learning_rate: 0.0002
gamma: 0.99
gae_lambda: 0.95
clip_coef: 0.2
vf_coef: 0.5
ent_coef: 0.0
max_grad_norm: 0.5
target_kl: null
update_epochs: 10
num_minibatches: 32
anneal_lr: true

run_dir: runs/cleanrl_ppo
tensorboard: true
wandb: false
wandb_project: k1-walk-mujoco
eval_every_updates: 10
eval_episodes: 1
save_every_updates: 50
print_every_updates: 5
nan_watchdog: true

env_overrides:
  env:
    episode_seconds: 18.0
  task:
    mode: goal_pose
    goal:
      min_goal_radius_m: 1.0
      max_goal_radius_m: 2.5
      success_pos_tol_m: 0.2
      success_yaw_tol_deg: 10.0
  reward:
    w_progress: 10.0
    w_goal_bonus: 10.0
  randomization:
    enabled: true
    friction_range: [0.85, 1.15]
    mass_scale_range: [0.9, 1.1]
    motor_strength_scale_range: [0.9, 1.1]
    obs_noise_std: 0.004
    action_latency_steps: [0, 1]
    push:
      enabled: true
      interval_seconds_range: [3.5, 6.0]
      impulse_xy_range: [0.02, 0.06]
