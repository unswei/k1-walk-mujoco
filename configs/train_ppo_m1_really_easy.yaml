seed: 1
milestone: m1
env_config_path: configs/env_k1_walk.yaml
eval_suite_path: configs/eval_suites_goal_pose.yaml
eval_nominal_suite: m1_nominal_stage1
eval_stress_suite: m1_nominal_stage1
eval_extra_suites: []

device: auto
total_timesteps: 12000000
num_envs: auto
num_steps: 512
learning_rate: 0.0003
gamma: 0.99
gae_lambda: 0.95
clip_coef: 0.2
vf_coef: 0.5
ent_coef: 0.0
max_grad_norm: 0.5
target_kl: null
update_epochs: 10
num_minibatches: 32
anneal_lr: true

run_dir: runs/cleanrl_ppo
tensorboard: true
wandb: false
wandb_project: k1-walk-mujoco
eval_every_updates: 10
eval_episodes: 1
save_every_updates: 50
print_every_updates: 5
nan_watchdog: true

env_overrides:
  task:
    mode: velocity
  env:
    v_x_target: 0.25
    reset_noise_qpos_std: 0.002
    reset_noise_qvel_std: 0.01
  reward:
    w_upright: 2.0
    w_alive: 0.3
    w_torque_penalty: 0.003
  randomization:
    enabled: false
